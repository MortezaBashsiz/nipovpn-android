name: Android Pre-Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  PACKAGE_VERSION: 1.1.57

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NipoVPN

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p ../release
          cp app/build/outputs/apk/debug/app-debug.apk \
             ../release/NipoVPN-${{ env.PACKAGE_VERSION }}.apk

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ env.PACKAGE_VERSION }}
          name: Android build ${{ env.PACKAGE_VERSION }}
          prerelease: true
          generate_release_notes: true
          files: release/*.apk